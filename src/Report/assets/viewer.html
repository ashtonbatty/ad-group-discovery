<!DOCTYPE html>
<!--
  AD Vendor Group Discovery — interactive report (viewer)
  Offline, no CDN: Tabulator 6.5.2 (MIT, (c) Oliver Folkerd) is loaded from the
  sibling tabulator.min.js / tabulator.min.css files, which the report writer
  copies next to this page. Data is loaded from a sibling `discovery-data.js`
  (window.__DISCOVERY__) via a <script> tag, or dropped in manually. No network
  access is required to view, but the report directory must travel as a unit.

  SECURITY: group metadata is attacker-influenceable. Every data-bearing value is
  rendered as TEXT via DOM nodes (textContent) or element-returning formatters —
  never innerHTML with data, and no Tabulator "html" formatter. Keep it that way.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AD Vendor Group Discovery</title>
<link rel="stylesheet" href="tabulator.min.css">
<style>
:root{
  --sans:"Segoe UI",system-ui,-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;
  --mono:"Cascadia Code","Cascadia Mono",Consolas,"SF Mono",ui-monospace,Menlo,monospace;
  --ink:#0f172a; --ink-2:#334155; --muted:#64748b; --faint:#94a3b8;
  --line:#e2e8f0; --line-2:#cbd5e1; --page:#eef2f6; --card:#ffffff;
  --rail:#0f172a; --rail-2:#1e293b; --accent:#2563eb; --accent-ink:#1d4ed8;
  --cf-fg:#6d28d9; --cf-bg:#f5f3ff; --cf-br:#7c3aed;
  --hi-fg:#b91c1c; --hi-bg:#fef2f2; --hi-br:#dc2626;
  --md-fg:#b45309; --md-bg:#fffbeb; --md-br:#d97706;
  --lo-fg:#475569; --lo-bg:#f8fafc; --lo-br:#94a3b8;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--page);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
#app{display:none;flex-direction:column;height:100vh}

/* ---- Header rail ---- */
header{background:var(--rail);color:#f8fafc;padding:16px 22px 15px;display:flex;align-items:flex-end;gap:28px;flex-wrap:wrap}
.brand{display:flex;flex-direction:column;gap:3px;min-width:0}
.eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#7c8ba1;font-weight:600}
h1{margin:0;font-size:23px;font-weight:650;letter-spacing:-.015em;color:#fff}
.stats{display:flex;gap:26px;margin-left:auto;flex-wrap:wrap}
.stat{display:flex;flex-direction:column;gap:1px}
.stat .k{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#7c8ba1;font-weight:600}
.stat .v{font-size:19px;font-weight:600;color:#e2e8f0;font-variant-numeric:tabular-nums}
.stat .v.mono{font-family:var(--mono);font-size:14px;font-weight:500;padding-top:5px}

/* ---- Warning banner ---- */
#banner{display:none;background:var(--md-bg);border-left:4px solid var(--md-br);color:#7c2d12;padding:9px 22px;font-size:13px}
#banner strong{font-weight:650}
#banner ul{margin:5px 0 0;padding-left:18px}
#banner li{margin:1px 0}

/* ---- Toolbar ---- */
.toolbar{display:flex;align-items:center;gap:10px;padding:11px 22px;background:var(--card);border-bottom:1px solid var(--line);flex-wrap:wrap}
.tool{display:flex;align-items:center;gap:7px}
.tool label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600}
.search{position:relative;flex:1 1 240px;max-width:400px}
.search input{width:100%;padding:8px 11px 8px 32px;border:1px solid var(--line-2);border-radius:7px;font:inherit;font-size:13px;background:#fff;color:var(--ink)}
.search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none}
select,button.btn{font:inherit;font-size:13px;border:1px solid var(--line-2);background:#fff;color:var(--ink-2);border-radius:7px;padding:7px 11px;cursor:pointer}
select:hover,button.btn:hover{border-color:var(--faint);background:#f8fafc}
button.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
button.btn.primary:hover{background:var(--accent-ink);border-color:var(--accent-ink)}
select:focus-visible,button:focus-visible,input:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
.spacer{flex:1}
.seg{display:inline-flex;border:1px solid var(--line-2);border-radius:7px;overflow:hidden}
.seg button{border:0;border-radius:0;background:#fff;padding:7px 10px;cursor:pointer;font:inherit;font-size:12px;color:var(--ink-2)}
.seg button+button{border-left:1px solid var(--line-2)}
.seg button:hover{background:#f1f5f9}

/* ---- Columns popover ---- */
.pop-wrap{position:relative}
.pop{display:none;position:absolute;right:0;top:calc(100% + 6px);z-index:30;background:#fff;border:1px solid var(--line-2);border-radius:9px;box-shadow:0 12px 30px rgba(15,23,42,.16);padding:8px;min-width:210px;max-height:60vh;overflow:auto}
.pop.open{display:block}
.pop .pop-h{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:4px 8px 6px}
.pop label{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--ink-2)}
.pop label:hover{background:#f1f5f9}
.pop input{accent-color:var(--accent);width:15px;height:15px}

/* ---- Grid area ---- */
main{flex:1;min-height:0;padding:16px 22px 22px;display:flex}
#grid-card{flex:1;min-height:0;background:var(--card);border:1px solid var(--line);border-radius:11px;box-shadow:0 1px 2px rgba(15,23,42,.05);overflow:hidden}

/* ---- Tabulator overrides ---- */
.tabulator{background:transparent;border:0;font-family:var(--sans);font-size:13px}
.tabulator .tabulator-header{background:#f8fafc;border-bottom:1px solid var(--line);color:var(--ink-2)}
.tabulator .tabulator-col{background:transparent;border-right:1px solid var(--line)}
.tabulator .tabulator-col .tabulator-col-title{font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:650;color:var(--muted);padding:9px 10px 7px}
.tabulator .tabulator-header-filter input,.tabulator .tabulator-header-filter select{border:1px solid var(--line-2);border-radius:5px;font-size:12px;padding:3px 6px;font-family:var(--sans)}
.tabulator .tabulator-row{border-bottom:1px solid var(--line)}
.tabulator .tabulator-row.tabulator-row-even{background:#fcfdfe}
.tabulator .tabulator-row:hover{background:#eff6ff}
.tabulator .tabulator-row.row-open{background:#eef2ff}
.tabulator .tabulator-cell{border-right:1px solid var(--line);padding:8px 10px;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tabulator-row .tabulator-cell.c-name{font-weight:600;color:var(--ink)}
.cell-mono{font-family:var(--mono);font-size:12px;color:var(--muted)}

/* group rows */
.tabulator .tabulator-group{background:#f1f5f9;border-bottom:1px solid var(--line-2);border-top:1px solid var(--line-2);padding:7px 10px}
.tabulator .tabulator-group.tabulator-group-level-0{font-weight:600}
.grp{display:flex;align-items:center;gap:11px}
.grp-label{font-size:13px;font-weight:650;color:var(--ink);letter-spacing:-.01em}
.grp-count{font-size:11px;font-weight:600;color:var(--muted);background:#e2e8f0;border-radius:20px;padding:2px 9px;letter-spacing:.02em}

/* confidence pill */
.pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 9px 2px 8px;border-radius:20px;border:1px solid transparent}
.pill::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.pill.Confirmed{color:var(--cf-fg);background:var(--cf-bg);border-color:var(--cf-br)}
.pill.High{color:var(--hi-fg);background:var(--hi-bg);border-color:var(--hi-br)}
.pill.Medium{color:var(--md-fg);background:var(--md-bg);border-color:var(--md-br)}
.pill.Low{color:var(--lo-fg);background:var(--lo-bg);border-color:var(--lo-br)}
.mcount{font-family:var(--mono);font-size:12px;color:var(--ink-2)}
.mcount .z{color:var(--faint)}

/* ---- Detail drawer ---- */
#scrim{display:none;position:fixed;inset:0;background:rgba(15,23,42,.28);z-index:40}
#scrim.open{display:block}
#drawer{position:fixed;top:0;right:0;height:100vh;width:min(480px,92vw);background:#fff;z-index:50;box-shadow:-16px 0 40px rgba(15,23,42,.18);transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
#drawer.open{transform:none}
@media (prefers-reduced-motion:reduce){#drawer{transition:none}}
.dr-head{padding:18px 20px 15px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:12px}
.dr-head .dr-title{margin:0;font-size:17px;font-weight:650;color:var(--ink);letter-spacing:-.01em;word-break:break-word}
.dr-head .dr-sub{font-size:12px;color:var(--muted);margin-top:3px;font-family:var(--mono);word-break:break-all}
.dr-close{margin-left:auto;flex:none;border:1px solid var(--line-2);background:#fff;border-radius:8px;width:32px;height:32px;font-size:17px;line-height:1;cursor:pointer;color:var(--muted)}
.dr-close:hover{background:#f1f5f9;color:var(--ink)}
.dr-body{flex:1;overflow:auto;padding:16px 20px 28px}
.dr-sec{margin-bottom:20px}
.dr-sec>h3{margin:0 0 8px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:8px}
.dr-sec>h3 .n{color:var(--faint);font-weight:600}
.kv{display:grid;grid-template-columns:120px 1fr;gap:4px 12px;font-size:13px}
.kv dt{color:var(--muted)}
.kv dd{margin:0;color:var(--ink-2);word-break:break-word}
.kv dd.mono{font-family:var(--mono);font-size:12px;word-break:break-all}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;background:#f1f5f9;border:1px solid var(--line);border-radius:6px;padding:3px 8px;color:var(--ink-2)}
.chip b{font-weight:650;color:var(--ink)}
.chip .arrow{color:var(--faint)}
.mlist{display:flex;flex-direction:column;gap:6px}
.mrow{display:flex;align-items:baseline;gap:9px;font-size:13px;padding:6px 9px;border:1px solid var(--line);border-radius:7px;background:#fafbfc}
.mrow .mtag{flex:none;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:5px;background:#e2e8f0;color:var(--ink-2)}
.mrow .mtag.Known{background:var(--cf-bg);color:var(--cf-fg)}
.mrow .mtag.NestedGroup{background:#e0f2fe;color:#0369a1}
.mrow .mname{font-weight:600;color:var(--ink)}
.mrow .msam{font-family:var(--mono);font-size:11px;color:var(--muted)}
.mrow .mdn{font-family:var(--mono);font-size:11px;color:var(--faint);word-break:break-all;margin-left:auto;text-align:right;max-width:55%}
.empty-note{color:var(--faint);font-size:13px;font-style:italic}
.tag-list{display:flex;flex-direction:column;gap:4px;font-size:13px;color:var(--ink-2)}

/* ---- Empty / load state ---- */
#empty{display:flex;align-items:center;justify-content:center;height:100vh;padding:24px}
.drop{max-width:520px;width:100%;text-align:center;background:#fff;border:2px dashed var(--line-2);border-radius:16px;padding:44px 40px}
.drop.hot{border-color:var(--accent);background:#eff6ff}
.drop .eyebrow{color:var(--muted);justify-content:center}
.drop h2{margin:10px 0 6px;font-size:20px;color:var(--ink);font-weight:650}
.drop p{margin:0 auto 18px;color:var(--muted);max-width:400px;font-size:13.5px}
.drop .file-btn{display:inline-block;background:var(--accent);color:#fff;border-radius:8px;padding:10px 18px;font-weight:600;font-size:14px;cursor:pointer}
.drop .file-btn:hover{background:var(--accent-ink)}
.drop code{font-family:var(--mono);font-size:12px;background:#f1f5f9;padding:2px 6px;border-radius:5px;color:var(--ink-2)}
.drop .err{color:var(--hi-fg);font-size:13px;margin-top:14px;min-height:18px}
</style>
</head>
<body>

<!-- ============ Empty / load state ============ -->
<div id="empty">
  <div class="drop" id="drop">
    <div class="eyebrow">Active Directory</div>
    <h2>Vendor Group Discovery</h2>
    <p>No report data found. Place <code>discovery-data.js</code> next to this file and
       reopen, or drop a <code>discovery-data.js</code> / <code>.json</code> here.</p>
    <label class="file-btn">Choose file…<input type="file" id="file" accept=".js,.json,application/json,text/javascript" hidden></label>
    <div class="err" id="err"></div>
  </div>
</div>

<!-- ============ Application ============ -->
<div id="app">
  <header>
    <div class="brand">
      <div class="eyebrow">Active Directory</div>
      <h1>Vendor Group Discovery</h1>
    </div>
    <div class="stats">
      <div class="stat"><span class="k">Groups</span><span class="v" id="stat-count">0</span></div>
      <div class="stat"><span class="k">Generated</span><span class="v mono" id="stat-gen">—</span></div>
    </div>
  </header>
  <div id="banner"></div>
  <div class="toolbar">
    <div class="tool">
      <label for="groupby">Group by</label>
      <select id="groupby">
        <option value="domain" selected>Domain</option>
        <option value="confidence">Confidence</option>
        <option value="groupScope">Scope</option>
        <option value="groupCategory">Category</option>
        <option value="source">Source</option>
        <option value="__knownMember">Member (known users)</option>
        <option value="">None</option>
      </select>
    </div>
    <div class="seg" role="group" aria-label="Group visibility">
      <button id="collapse" type="button">Collapse all</button>
      <button id="expand" type="button">Expand all</button>
    </div>
    <div class="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input id="search" type="search" placeholder="Search all columns…" autocomplete="off">
    </div>
    <div class="spacer"></div>
    <div class="tool pop-wrap">
      <button class="btn" id="cols-btn" type="button" aria-haspopup="true">Columns ▾</button>
      <div class="pop" id="cols-pop"><div class="pop-h">Show columns</div></div>
    </div>
    <button class="btn primary" id="export" type="button">Export CSV</button>
  </div>
  <main><div id="grid-card"></div></main>
</div>

<!-- ============ Detail drawer ============ -->
<div id="scrim"></div>
<aside id="drawer" aria-hidden="true" aria-label="Group detail">
  <div class="dr-head">
    <div style="min-width:0">
      <h2 class="dr-title" id="dr-title"></h2>
      <div class="dr-sub" id="dr-sub"></div>
    </div>
    <button class="dr-close" id="dr-close" type="button" aria-label="Close detail">×</button>
  </div>
  <div class="dr-body" id="dr-body"></div>
</aside>

<!-- Tabulator library: shipped as a sibling file, copied next to this report by the report writer. A relative <script src> works from file:// with no server. -->
<script src="tabulator.min.js"></script>
<!-- Sidecar data: emitted by Write-JsonReport next to this file. A <script src> load
     works from file:// (unlike fetch); if the file is absent it 404s and the viewer
     falls back to the drag-and-drop empty state. -->
<script src="discovery-data.js"></script>
<script>
(function(){
  "use strict";
  var RANK = { Confirmed:3, High:2, Medium:1, Low:0 };
  var table = null, wired = false;

  // ---------- tiny DOM helpers (text-only; never innerHTML with data) ----------
  function el(tag, cls, text){ var n=document.createElement(tag); if(cls) n.className=cls; if(text!=null) n.textContent=String(text); return n; }
  // Robust to Windows PowerShell 5.1 ConvertTo-Json, which unrolls a single-element
  // array to a bare object/scalar: wrap a lone non-null value back into an array.
  function arr(v){ return Array.isArray(v) ? v : (v==null ? [] : [v]); }
  // CSV formula-injection guard, mirroring Protect-CsvCell (the pipeline CSV path).
  function csvGuard(v){ v = (v==null) ? "" : String(v); return /^[=+\-@\t\r]/.test(v) ? "'"+v : v; }
  function setText(id, v){ document.getElementById(id).textContent = (v==null||v==="") ? "—" : String(v); }

  // ---------- formatters (return DOM elements => injection-safe) ----------
  function fmtText(cell){ return el("span", null, cell.getValue()==null?"":cell.getValue()); }
  function fmtMono(cell){ return el("span", "cell-mono", cell.getValue()==null?"":cell.getValue()); }
  function fmtConfidence(cell){
    var v = cell.getValue()||"";
    return el("span", "pill "+v, v);
  }
  function fmtMemberOf(cell){ return el("span", null, arr(cell.getValue()).join("; ")); }
  // "Alice Smith (asmith)" — the one member display string used by the Member List
  // column, its export, and the known-member grouping, so they always agree.
  function memberLabel(m){
    var name = (m && (m.displayName || m.samAccountName)) || "(unknown)";
    return (m && m.samAccountName && m.samAccountName !== name) ? name+" ("+m.samAccountName+")" : name;
  }
  function fmtMembers(cell){ return el("span", null, arr(cell.getValue()).map(memberLabel).join("; ")); }
  // Non-zero buckets spelled out ("3 known · 1 other") — a bare count+letter like
  // "1O" reads as the number 10.
  function countParts(d){
    var c = (d && d.memberCounts) || {};
    var parts = [];
    [["known",c.known],["nested",c.nested],["other",c.other]].forEach(function(p){ if(p[1]) parts.push(p[1]+" "+p[0]); });
    return parts;
  }
  // Download accessors: harden text against CSV formula injection and render the
  // object/array columns as readable strings instead of "[object Object]".
  function dlText(value){ return csvGuard(value); }
  function dlMemberOf(value){ return csvGuard(arr(value).join("; ")); }
  function dlCounts(value, data){ var parts = countParts(data); return parts.length ? parts.join("; ") : "0"; }
  function dlMembers(value){
    return csvGuard(arr(value).map(function(m){ return memberLabel(m) + (m && m.memberType ? " ["+m.memberType+"]" : ""); }).join("; "));
  }
  function withDownloadAccessors(cols){
    cols.forEach(function(c){
      if(c.field==="memberCounts") c.accessorDownload = dlCounts;
      else if(c.field==="memberOf") c.accessorDownload = dlMemberOf;
      else if(c.field==="members") c.accessorDownload = dlMembers;
      else if(c.field) c.accessorDownload = dlText;
    });
    return cols;
  }
  function fmtCounts(cell){
    var wrap = el("span","mcount");
    var parts = countParts(cell.getData());
    if(!parts.length){ wrap.appendChild(el("span","z","0")); return wrap; }
    parts.forEach(function(p,i){
      if(i) wrap.appendChild(el("span","z"," · "));
      wrap.appendChild(el("span",null,p));
    });
    return wrap;
  }
  function totalMembers(d){ var c=d.memberCounts||{}; return (c.known||0)+(c.nested||0)+(c.other||0); }

  // ---------- sorters ----------
  function sortConfidence(a,b){ return (RANK[a]||0)-(RANK[b]||0); }
  function sortCounts(a,b,aRow,bRow){ return totalMembers(aRow.getData())-totalMembers(bRow.getData()); }
  function sortMemberOf(a,b){ return arr(a).length-arr(b).length; }
  function sortMembers(a,b){
    return arr(a).map(memberLabel).join("; ").toLowerCase().localeCompare(arr(b).map(memberLabel).join("; ").toLowerCase());
  }

  // ---------- member matching (Member List header filter + global search) ----------
  function memberSearch(term, members){
    term = String(term).toLowerCase();
    return arr(members).some(function(m){
      return ((m && m.displayName ? m.displayName : "")+" "+(m && m.samAccountName ? m.samAccountName : "")).toLowerCase().indexOf(term) > -1;
    });
  }
  // In the "Member (known users)" grouping each row stands for one specific known
  // member (rowData.__knownMember), even though it still carries the group's FULL
  // original member list. Matching against that full list here would leak a row
  // into every known member's bucket it happens to share a group with, instead of
  // just its own. Prefer the row's own bucket value when present; fall back to a
  // full-roster search for the ungrouped view, where there is no single "owning" member.
  function filterMembers(headerValue, rowValue, rowData){
    if(headerValue==="") return true;
    if(rowData && rowData.__knownMember!=null){
      return String(rowData.__knownMember).toLowerCase().indexOf(String(headerValue).toLowerCase()) > -1;
    }
    return memberSearch(headerValue, rowValue);
  }

  // ---------- column definitions ----------
  function columns(){
    return [
      { title:"Confidence", field:"confidence", width:132, formatter:fmtConfidence, sorter:sortConfidence,
        headerFilter:"list", headerFilterParams:{values:{"":"All",Confirmed:"Confirmed",High:"High",Medium:"Medium",Low:"Low"}, clearable:true} },
      { title:"Score", field:"score", width:88, hozAlign:"right", sorter:"number", formatter:fmtText,
        headerFilter:"number", headerFilterFunc:">=", headerFilterPlaceholder:"≥" },
      { title:"Name", field:"name", widthGrow:3, minWidth:180, cssClass:"c-name", formatter:fmtText, headerFilter:"input" },
      { title:"Domain", field:"domain", widthGrow:2, minWidth:150, formatter:fmtText, headerFilter:"input" },
      { title:"Owner", field:"owner", widthGrow:2, minWidth:130, formatter:fmtText, headerFilter:"input" },
      { title:"Description", field:"description", widthGrow:4, minWidth:200, formatter:fmtText, headerFilter:"input" },
      { title:"Members", field:"memberCounts", width:170, headerSort:true, sorter:sortCounts, formatter:fmtCounts,
        headerTooltip:"Member counts: known vendor users · nested groups · other" },
      { title:"Member List", field:"members", widthGrow:3, minWidth:200, visible:false, download:true,
        formatter:fmtMembers, sorter:sortMembers, headerFilter:"input", headerFilterFunc:filterMembers,
        headerFilterPlaceholder:"name or sam…",
        headerTooltip:"All captured members; filter matches display name or sAMAccountName" },
      // Only meaningful in the "Member (known users)" grouping (one row per known
      // member); auto-shown there by applyGroupBy. field is the raw sam so the
      // column header sorts by sam, not by the "Name (sam)" display label.
      { title:"Known User", field:"__knownSam", widthGrow:2, minWidth:160, visible:false, download:true,
        formatter:function(cell){ return el("span", null, cell.getData().__knownMember || ""); },
        sorter:"string", headerFilter:"input", headerFilterFunc:filterMembers,
        headerFilterPlaceholder:"name or sam…",
        headerTooltip:"The known vendor user this row is grouped under; sortable and filterable by name or sAMAccountName" },
      { title:"Member Of", field:"memberOf", widthGrow:2, minWidth:140, formatter:fmtMemberOf, sorter:sortMemberOf, headerFilter:"input" },
      { title:"Scope", field:"groupScope", width:120, formatter:fmtText,
        headerFilter:"list", headerFilterParams:{valuesLookup:true, clearable:true} },
      { title:"Category", field:"groupCategory", width:130, formatter:fmtText,
        headerFilter:"list", headerFilterParams:{valuesLookup:true, clearable:true} },
      { title:"Info", field:"info", widthGrow:2, minWidth:140, visible:false, formatter:fmtText, headerFilter:"input" },
      { title:"Mail", field:"mail", widthGrow:2, minWidth:140, visible:false, formatter:fmtText, headerFilter:"input" },
      { title:"Admin", field:"adminCount", width:90, visible:false, hozAlign:"right", formatter:fmtText, headerFilter:"input" },
      { title:"Created", field:"whenCreated", width:150, visible:false, formatter:fmtMono, headerFilter:"input" },
      { title:"Changed", field:"whenChanged", width:150, visible:false, formatter:fmtMono, headerFilter:"input" },
      { title:"Distinguished Name", field:"distinguishedName", widthGrow:3, minWidth:200, visible:false, formatter:fmtMono, headerFilter:"input" }
    ];
  }

  // ---------- group headers (element => injection-safe) ----------
  function groupHeader(value, count){
    var wrap = el("div","grp");
    wrap.appendChild(el("span","grp-label", (value==null||value==="") ? "(none)" : value));
    wrap.appendChild(el("span","grp-count", count + (count===1?" group":" groups")));
    return wrap;
  }

  // ---------- detail drawer ----------
  var scrim=document.getElementById("scrim"), drawer=document.getElementById("drawer");
  function section(title, n){
    var s=el("div","dr-sec"); var h=el("h3",null,title);
    if(n!=null){ h.appendChild(el("span","n"," "+n)); }
    s.appendChild(h); return s;
  }
  function kv(pairs){
    var dl=el("dl","kv");
    pairs.forEach(function(p){
      if(p[1]==null || p[1]==="") return;
      dl.appendChild(el("dt",null,p[0]));
      dl.appendChild(el("dd", p[2]?"mono":null, p[1]));
    });
    return dl;
  }
  function openDetail(d){
    document.getElementById("dr-title").textContent = d.name || "(unnamed group)";
    document.getElementById("dr-sub").textContent = d.distinguishedName || d.domain || "";
    var body = document.getElementById("dr-body"); body.textContent="";

    var overview = section("Overview");
    overview.appendChild(kv([
      ["Confidence", d.confidence], ["Score", d.score], ["Domain", d.domain],
      ["Owner", d.owner], ["Scope", d.groupScope], ["Category", d.groupCategory],
      ["Source", d.source], ["Mail", d.mail], ["Admin count", d.adminCount],
      ["Created", d.whenCreated], ["Changed", d.whenChanged]
    ]));
    body.appendChild(overview);

    if(d.description){ var ds=section("Description"); ds.appendChild(el("div","tag-list", d.description)); body.appendChild(ds); }
    if(d.info){ var infs=section("Info"); infs.appendChild(el("div","tag-list", d.info)); body.appendChild(infs); }

    var reasons = arr(d.reasons);
    var rs = section("Match reasons", reasons.length);
    if(reasons.length){
      var chips = el("div","chips");
      reasons.forEach(function(r){
        var c = el("span","chip"); c.appendChild(el("b",null, r.pattern));
        if(r.value){ c.appendChild(el("span","arrow","→")); c.appendChild(el("span",null, r.value)); }
        chips.appendChild(c);
      });
      rs.appendChild(chips);
    } else { rs.appendChild(el("div","empty-note","No match reasons recorded.")); }
    body.appendChild(rs);

    var members = arr(d.members);
    var ms = section("Members", members.length);
    if(members.length){
      var list = el("div","mlist");
      members.forEach(function(m){
        var row = el("div","mrow");
        row.appendChild(el("span","mtag "+(m.memberType||""), m.memberType||"Other"));
        row.appendChild(el("span","mname", m.displayName || m.samAccountName || "(unknown)"));
        if(m.samAccountName) row.appendChild(el("span","msam", m.samAccountName));
        if(m.distinguishedName) row.appendChild(el("span","mdn", m.distinguishedName));
        list.appendChild(row);
      });
      ms.appendChild(list);
    } else { ms.appendChild(el("div","empty-note","No members captured.")); }
    body.appendChild(ms);

    var mo = arr(d.memberOf);
    if(mo.length){
      var mos = section("Member of", mo.length);
      var tl = el("div","tag-list");
      mo.forEach(function(g){ tl.appendChild(el("div",null, g)); });
      mos.appendChild(tl); body.appendChild(mos);
    }

    scrim.classList.add("open"); drawer.classList.add("open"); drawer.setAttribute("aria-hidden","false");
  }
  function closeDetail(){ scrim.classList.remove("open"); drawer.classList.remove("open"); drawer.setAttribute("aria-hidden","true"); }
  scrim.addEventListener("click", closeDetail);
  document.getElementById("dr-close").addEventListener("click", closeDetail);
  document.addEventListener("keydown", function(e){ if(e.key==="Escape") closeDetail(); });

  // ---------- global search ----------
  var SEARCH_FIELDS = ["name","domain","owner","description","info","mail","confidence","score","adminCount","whenCreated","whenChanged","groupScope","groupCategory","source","distinguishedName"];
  function globalMatch(data, params){
    var t = (params.term||"").toLowerCase(); if(!t) return true;
    for(var i=0;i<SEARCH_FIELDS.length;i++){ var val=data[SEARCH_FIELDS[i]]; if(val!=null && String(val).toLowerCase().indexOf(t)>-1) return true; }
    if(arr(data.memberOf).some(function(g){ return String(g).toLowerCase().indexOf(t)>-1; })) return true;
    if(arr(data.reasons).some(function(r){ return (String(r.pattern)+" "+String(r.value)).toLowerCase().indexOf(t)>-1; })) return true;
    // Same leak as filterMembers: a member-mode row must match on its own known
    // member, not any member of the group it was expanded from.
    if(data.__knownMember!=null) return String(data.__knownMember).toLowerCase().indexOf(t) > -1;
    if(memberSearch(t, data.members)) return true;
    return false;
  }

  // ---------- group-by (with confidence ordered by rank, not appearance) ----------
  // "Member (known users)" grouping is row-per-membership: each group row is
  // duplicated once per known vendor member (synthetic __knownMember field), so a
  // group appears under every known user it contains. The base rows are restored
  // when any other grouping is chosen; the header Groups stat stays the true count.
  var baseRows = [], memberMode = false;
  var NO_KNOWN = "(no known members)";
  function shallowCopy(o){ var c={}; for(var k in o){ if(Object.prototype.hasOwnProperty.call(o,k)) c[k]=o[k]; } return c; }
  function expandByKnownMember(rows){
    var out = [];
    rows.forEach(function(d){
      var known = arr(d.members).filter(function(m){ return m && m.memberType==="Known"; });
      if(!known.length){ var c=shallowCopy(d); c.__knownMember=NO_KNOWN; c.__knownSam=""; out.push(c); return; }
      known.forEach(function(m){
        var c=shallowCopy(d);
        c.__knownMember=memberLabel(m);
        c.__knownSam=(m && m.samAccountName) ? m.samAccountName : "";
        out.push(c);
      });
    });
    return out;
  }
  var DEFAULT_SORT = [ {column:"confidence", dir:"desc"}, {column:"score", dir:"desc"} ];
  function applyGroupBy(field){
    var wantMember = field==="__knownMember";
    if(wantMember !== memberMode){
      memberMode = wantMember;
      table.setData(wantMember ? expandByKnownMember(baseRows) : baseRows);
      var knownUserCol = table.getColumn("__knownSam");
      if(knownUserCol){ wantMember ? knownUserCol.show() : knownUserCol.hide(); }
      // The known-user grouping reads best sorted alphabetically by sam within it;
      // leaving the table's own row sort would otherwise still order by confidence/
      // score, which has nothing to do with how the groups themselves are keyed.
      table.setSort(wantMember ? [{column:"__knownSam", dir:"asc"}] : DEFAULT_SORT);
    }
    table.setGroupValues(field==="confidence" ? [["Confirmed","High","Medium","Low"]] : false);
    table.setGroupBy(field || false);
  }

  // ---------- group collapse/expand (recursive) ----------
  function eachGroup(groups, fn){ groups.forEach(function(g){ fn(g); var sub=g.getSubGroups?g.getSubGroups():[]; if(sub&&sub.length) eachGroup(sub, fn); }); }

  // ---------- columns popover ----------
  function buildColsPopover(){
    var pop = document.getElementById("cols-pop");
    pop.querySelectorAll("label").forEach(function(n){ n.remove(); });
    table.getColumns().forEach(function(col){
      var def = col.getDefinition(); if(!def.field) return;
      var lab = el("label"); var cb = el("input"); cb.type="checkbox"; cb.checked = col.isVisible();
      cb.addEventListener("change", function(){ cb.checked ? col.show() : col.hide(); });
      lab.appendChild(cb); lab.appendChild(el("span",null, def.title));
      pop.appendChild(lab);
    });
  }

  // ---------- wire the toolbar once ----------
  function wireToolbar(){
    if(wired) return; wired = true;
    var term = "";
    document.getElementById("search").addEventListener("input", function(e){
      term = e.target.value; table.setFilter(globalMatch, {term:term});
    });
    document.getElementById("groupby").addEventListener("change", function(e){
      applyGroupBy(e.target.value);
    });
    // blockRedraw around the loop: collapsing a group re-renders and would
    // otherwise invalidate the remaining group references mid-iteration.
    document.getElementById("collapse").addEventListener("click", function(){ table.blockRedraw(); eachGroup(table.getGroups(), function(g){ g.hide(); }); table.restoreRedraw(); });
    document.getElementById("expand").addEventListener("click", function(){ table.blockRedraw(); eachGroup(table.getGroups(), function(g){ g.show(); }); table.restoreRedraw(); });
    document.getElementById("export").addEventListener("click", function(){ table.download("csv","discovery-filtered.csv"); });
    var colsBtn=document.getElementById("cols-btn"), colsPop=document.getElementById("cols-pop");
    colsBtn.addEventListener("click", function(e){ e.stopPropagation(); colsPop.classList.toggle("open"); });
    document.addEventListener("click", function(e){ if(!colsPop.contains(e.target) && e.target!==colsBtn) colsPop.classList.remove("open"); });
  }

  // ---------- render ----------
  function render(data){
    document.getElementById("empty").style.display="none";
    document.getElementById("app").style.display="flex";
    setText("stat-count", arr(data.groups).length);
    setText("stat-gen", data.generatedAt);

    var summary = data.summary || {};
    var failed = arr(summary.failedDomains), warns = arr(summary.warnings);
    var banner = document.getElementById("banner");
    banner.textContent="";
    if(failed.length || warns.length){
      if(failed.length){ banner.appendChild(el("strong",null,"Failed domains: ")); banner.appendChild(el("span",null, failed.join(", "))); }
      if(warns.length){
        banner.appendChild(el("strong", null, (failed.length?"  ":"") + warns.length + (warns.length===1?" warning":" warnings")));
        var ul=el("ul"); warns.forEach(function(w){ ul.appendChild(el("li",null,w)); }); banner.appendChild(ul);
      }
      banner.style.display="block";
    } else { banner.style.display="none"; }

    baseRows = arr(data.groups); memberMode = false;
    document.getElementById("groupby").value = "domain";
    table = new Tabulator("#grid-card", {
      data: baseRows,
      layout: "fitColumns",
      height: "100%",
      columns: withDownloadAccessors(columns()),
      movableColumns: true,
      groupBy: "domain",
      groupStartOpen: true,
      groupHeader: groupHeader,
      initialSort: DEFAULT_SORT,
      placeholder: "No groups match the current filters."
    });

    table.on("tableBuilt", function(){ wireToolbar(); buildColsPopover(); });
    table.on("columnVisibilityChanged", function(){ buildColsPopover(); });
    table.on("rowClick", function(e, row){ openDetail(row.getData()); });
  }

  // ---------- data loading ----------
  function parsePayload(text){
    text = text.replace(/^﻿/, "").trim();
    if(text.indexOf("window.__DISCOVERY__") === 0){
      text = text.replace(/^window\.__DISCOVERY__\s*=\s*/, "").replace(/;?\s*$/, "");
    }
    return JSON.parse(text);
  }
  function loadFile(file){
    var err=document.getElementById("err"); err.textContent="";
    var reader=new FileReader();
    reader.onload=function(){ try{ var d=parsePayload(String(reader.result)); if(!d||!d.groups) throw new Error("no 'groups' data"); render(d); }
      catch(ex){ err.textContent="Could not read that file: "+ex.message; } };
    reader.onerror=function(){ err.textContent="Could not read that file."; };
    reader.readAsText(file);
  }
  var drop=document.getElementById("drop"), fileInput=document.getElementById("file");
  fileInput.addEventListener("change", function(){ if(fileInput.files[0]) loadFile(fileInput.files[0]); });
  ["dragenter","dragover"].forEach(function(ev){ drop.addEventListener(ev, function(e){ e.preventDefault(); drop.classList.add("hot"); }); });
  ["dragleave","drop"].forEach(function(ev){ drop.addEventListener(ev, function(e){ e.preventDefault(); drop.classList.remove("hot"); }); });
  drop.addEventListener("drop", function(e){ if(e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });

  // ---------- boot ----------
  if(typeof Tabulator === "undefined"){
    document.getElementById("err").textContent =
      "tabulator.min.js was not found next to this file — copy the whole report directory together.";
  } else if(window.__DISCOVERY__ && window.__DISCOVERY__.groups){ render(window.__DISCOVERY__); }
})();
</script>
</body>
</html>
